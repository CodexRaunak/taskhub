<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskHub</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav id="navbar" class="hidden">
    <div class="nav-brand">TaskHub</div>
    <div class="nav-info">
      <span id="userDisplay"></span>
      <button class="btn-outline btn-sm" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <main>
    <section id="authSection">
      <div class="auth-card">
        <div class="auth-header">
          <h2 id="authTitle">Sign in</h2>
          <p id="authSubtitle">to continue to TaskHub</p>
        </div>
        <form id="authForm">
          <div id="nameField" class="hidden">
            <input type="text" id="nameInput" class="input" placeholder="Full name" autocomplete="name">
          </div>
          <input type="email" id="emailInput" class="input" placeholder="Email address" autocomplete="email" required>
          <input type="password" id="passwordInput" class="input" placeholder="Password" autocomplete="current-password" required>
          <p id="authError" class="error-msg hidden"></p>
          <button type="submit" class="btn-primary" id="authSubmit">Sign in</button>
        </form>
        <p class="auth-toggle">
          <span id="authToggleText">Don't have an account?</span>
          <a href="#" id="authToggle">Create one</a>
        </p>
      </div>
    </section>

    <section id="dashboardSection" class="hidden">
      <div class="dashboard">
        <div class="task-form-card">
          <h3>New Task</h3>
          <form id="taskForm">
            <input type="text" id="taskTitle" class="input" placeholder="What needs to be done?" required>
            <textarea id="taskDesc" class="input" placeholder="Description (optional)" rows="2"></textarea>
            <div class="form-row">
              <select id="taskStatus" class="input">
                <option value="todo">To Do</option>
                <option value="in_progress">In Progress</option>
                <option value="done">Done</option>
              </select>
              <select id="taskPriority" class="input">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </div>
            <button type="submit" class="btn-primary btn-full">Add Task</button>
          </form>
        </div>

        <div class="task-list">
          <div class="task-list-header">
            <h3>Tasks</h3>
            <div class="filter-group">
              <select id="filterStatus" class="input input-sm">
                <option value="all">All</option>
                <option value="todo">To Do</option>
                <option value="in_progress">In Progress</option>
                <option value="done">Done</option>
              </select>
            </div>
          </div>
          <div id="taskList" class="task-cards">
            <p class="empty-state">No tasks yet. Create one above.</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>
  <script src="/js/app.js"></script>
</body>
</html>
